name: btk_field_app
description: BTC Field App - Georgian Cartographers Association landscape field survey tool.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Map
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # State management
  flutter_riverpod: ^2.6.1

  # Storage
  shared_preferences: ^2.3.4

  # PDF viewer
  syncfusion_flutter_pdfviewer: ^33.2.7

  # GPS / location
  geolocator: ^13.0.2

  # Fonts (Georgian script support)
  google_fonts: ^6.2.1

  # Theme
  flex_color_scheme: ^8.2.0

  # Utilities
  uuid: ^4.5.1
  url_launcher: ^6.3.1
  intl: ^0.20.2
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/pdf/methodology.pdf
    - assets/geojson/georgia.geojson
