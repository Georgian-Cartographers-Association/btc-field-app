name: btk_field_app
description: BTC Field App - Georgian Cartographers Association landscape field survey tool.
publish_to: "none"
version: 1.6.0+8

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Map
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # State management
  flutter_riverpod: ^2.6.1

  # Storage
  shared_preferences: ^2.3.4

  # PDF viewer
  syncfusion_flutter_pdfviewer: ^33.2.7

  # GPS / location
  geolocator: ^13.0.2

  # Fonts (Georgian script support)
  google_fonts: ^6.2.1

  # Theme
  flex_color_scheme: ^8.2.0

  # Local raster map overlay
  file_picker: ^8.3.7
  path_provider: ^2.1.5

  # Export
  pdf: ^3.11.3
  printing: ^5.14.2
  share_plus: ^10.1.4

  # Database
  sqflite: ^2.4.1
  path: ^1.9.0

  # Screen always-on
  wakelock_plus: ^1.3.3

  # Compass sensor
  flutter_compass: ^0.7.0

  # Offline tile caching
  flutter_map_cache: ^1.5.1
  dio: ^5.7.0
  dio_cache_interceptor: ^3.5.0

  # Photos
  image_picker: ^1.1.2

  # Weather (yr.no / api.met.no — free, no key)
  http: ^1.2.1

  # Firebase
  firebase_core: ^3.13.1
  firebase_analytics: ^11.4.5

  # App version info
  package_info_plus: ^8.3.0

  # Utilities
  uuid: ^4.5.1
  url_launcher: ^6.3.1
  intl: ^0.20.2
  cupertino_icons: ^1.0.8
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.6.12

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/pdf/methodology.pdf
    - assets/geojson/georgia.geojson
    - assets/geojson/Regions.geojson
    - assets/geojson/Municipalities.geojson
    - assets/rasters/
